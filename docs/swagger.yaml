basePath: /api
definitions:
  project-telkom-sigma_internal_models.Activity:
    properties:
      activity_date:
        example: "2026-02-27T10:00:00Z"
        type: string
      area_code:
        example: 31.71.01.1001
        type: string
      id:
        type: integer
      name:
        example: Rapat Koordinasi
        type: string
      user_id:
        type: integer
      wilayah:
        $ref: '#/definitions/project-telkom-sigma_internal_models.Wilayah'
    type: object
  project-telkom-sigma_internal_models.LoginRequest:
    properties:
      password:
        example: password123
        type: string
      username:
        example: johndoe
        type: string
    type: object
  project-telkom-sigma_internal_models.User:
    properties:
      created_at:
        example: "2026-03-07T00:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      password:
        example: secret123
        type: string
      updated_at:
        example: "2026-03-07T00:00:00Z"
        type: string
      username:
        example: johndoe
        type: string
    type: object
  project-telkom-sigma_internal_models.Weather:
    properties:
      analysis_date:
        type: string
      area_code:
        type: string
      category:
        type: string
      hu:
        type: integer
      id:
        type: integer
      local_datetime:
        type: string
      sync_time:
        type: string
      t:
        type: number
      tcc:
        type: integer
      utc_datetime:
        type: string
      vs_text:
        type: string
      wd:
        type: string
      weather_desc:
        type: string
      weather_desc_en:
        type: string
      wilayah:
        $ref: '#/definitions/project-telkom-sigma_internal_models.Wilayah'
      ws:
        type: number
    type: object
  project-telkom-sigma_internal_models.Wilayah:
    properties:
      code:
        type: string
      created_at:
        type: string
      loc:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Dokumentasi API untuk Proyek Internal
  title: API Sistem Informasi Telkom Sigma
  version: "1.0"
paths:
  /api/activity:
    get:
      description: Mengambil daftar kegiatan milik user yang sedang login
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Daftar Semua Kegiatan User
      tags:
      - Activity
    post:
      consumes:
      - application/json
      description: Membuat rencana kegiatan baru milik user yang sedang login
      parameters:
      - description: Data JSON Kegiatan
        in: body
        name: activity
        required: true
        schema:
          $ref: '#/definitions/project-telkom-sigma_internal_models.Activity'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/project-telkom-sigma_internal_models.Activity'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Buat Rencana Kegiatan
      tags:
      - Activity
  /api/activity/delete:
    delete:
      description: Menghapus kegiatan milik user yang sedang login
      responses: {}
      security:
      - BearerAuth: []
      summary: Hapus Kegiatan
      tags:
      - Activity
  /api/activity/update:
    put:
      description: Mengubah data kegiatan milik user yang sedang login
      responses: {}
      security:
      - BearerAuth: []
      summary: Perbarui Kegiatan
      tags:
      - Activity
  /api/login:
    post:
      consumes:
      - application/json
      description: Autentikasi user dan mendapatkan JWT Token
      parameters:
      - description: Data Login
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/project-telkom-sigma_internal_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User Login
      tags:
      - Auth
  /api/register:
    post:
      consumes:
      - application/json
      description: Mendaftarkan user baru ke dalam sistem
      parameters:
      - description: Data User (Username & Password)
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/project-telkom-sigma_internal_models.User'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User Register
      tags:
      - Auth
  /api/weather:
    get:
      description: Mengambil semua data cuaca yang telah di-sync, diurutkan berdasarkan
        waktu sinkronisasi terbaru
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/project-telkom-sigma_internal_models.Weather'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Daftar Semua Data Cuaca
      tags:
      - Weather
  /api/weather/dashboard:
    get:
      description: Mengambil data agregasi untuk Pie Chart (Kategori) dan Column Chart
        (Suhu Harian)
      produces:
      - application/json
      responses:
        "200":
          description: 'Contoh: {pie_chart: [], column_chart: []}'
          schema:
            additionalProperties: true
            type: object
      summary: Data Statistik Dashboard
      tags:
      - Dashboard
  /api/weather/delete:
    delete:
      parameters:
      - description: ID Weather
        in: query
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Hapus Data Cuaca
      tags:
      - Weather
  /api/weather/detail:
    get:
      parameters:
      - description: ID Weather
        in: query
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Detail Data Cuaca
      tags:
      - Weather
  /api/weather/sync:
    post:
      description: Mengambil data cuaca dari API BMKG berdasarkan kode wilayah (adm4)
        dan menyimpannya ke database
      parameters:
      - description: 'Kode Wilayah (contoh: 31.71.01.1001)'
        in: query
        name: adm4
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sinkronisasi Data BMKG
      tags:
      - Weather
  /api/weather/update:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID Weather
        in: query
        name: id
        required: true
        type: string
      - description: Data Weather
        in: body
        name: weather
        required: true
        schema:
          $ref: '#/definitions/project-telkom-sigma_internal_models.Weather'
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update Data Cuaca
      tags:
      - Weather
  /api/wilayah:
    get:
      description: Mengambil data wilayah untuk dropdown search
      parameters:
      - description: Cari kode atau nama wilayah
        in: query
        name: q
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/project-telkom-sigma_internal_models.Wilayah'
            type: array
      summary: Daftar Wilayah (ADM4)
      tags:
      - Wilayah
  /health:
    get:
      description: Endpoint untuk memastikan backend berjalan lancar
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cek Status Server
      tags:
      - System
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
